    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    function safeUrl(url) {
      try {
        const parsed = new URL(url);
        if (parsed.protocol !== 'https:' && parsed.protocol !== 'http:') return '#';
        return parsed.href;
      } catch { return '#'; }
    }

    const MEMORY_SECTION_ORDER = ['Me', 'People', 'Terms', 'Projects', 'Preferences'];

    function detectMemorySectionType(title, content) {
      if (title === 'People' || title === 'Terms' || title === 'Projects') return 'table';
      if (title === 'Preferences') return 'list';
      if (/^\s*\|.+\|\s*$/m.test(content)) return 'table';
      if (/^\s*[-*]\s+.+$/m.test(content)) return 'list';
      return 'text';
    }

    function parseMemoryMarkdown(content) {
      const parsed = {
        title: 'Memory',
        intro: [],
        sectionOrder: [],
        sections: {},
        rawContent: content
      };

      const lines = content.split('\n');
      let currentSection = null;

      for (const line of lines) {
        const h1Match = line.match(/^#\s+(.+)$/);
        const h2Match = line.match(/^##\s+(.+)$/);

        if (h1Match) {
          parsed.title = h1Match[1].trim() || parsed.title;
          continue;
        }

        if (h2Match) {
          currentSection = h2Match[1].trim();
          if (!parsed.sections[currentSection]) {
            parsed.sectionOrder.push(currentSection);
            parsed.sections[currentSection] = {
              title: currentSection,
              rawLines: []
            };
          }
          continue;
        }

        if (currentSection) {
          parsed.sections[currentSection].rawLines.push(line);
        } else {
          parsed.intro.push(line);
        }
      }

      for (const sectionName of parsed.sectionOrder) {
        const section = parsed.sections[sectionName];
        const contentText = section.rawLines.join('\n').trim();
        section.content = contentText;
        section.type = detectMemorySectionType(sectionName, contentText);
      }

      for (const required of MEMORY_SECTION_ORDER) {
        if (!parsed.sections[required]) {
          parsed.sectionOrder.push(required);
          parsed.sections[required] = {
            title: required,
            rawLines: [],
            content: '',
            type: detectMemorySectionType(required, '')
          };
        }
      }

      parsed.sectionOrder.sort((a, b) => {
        const ai = MEMORY_SECTION_ORDER.indexOf(a);
        const bi = MEMORY_SECTION_ORDER.indexOf(b);
        if (ai === -1 && bi === -1) return a.localeCompare(b);
        if (ai === -1) return 1;
        if (bi === -1) return -1;
        return ai - bi;
      });

      return parsed;
    }

    function serializeMemoryMarkdown(parsed) {
      const lines = [`# ${parsed.title || 'Memory'}`];

      const intro = (parsed.intro || []).join('\n').trim();
      if (intro) lines.push('', intro);

      for (const sectionName of parsed.sectionOrder) {
        const section = parsed.sections[sectionName];
        lines.push('', `## ${sectionName}`);
        if ((section.content || '').trim()) {
          lines.push(section.content.trim());
        }
      }

      return lines.join('\n').replace(/\n{3,}/g, '\n\n').trim() + '\n';
    }

    function getPreview(content, maxLength = 150) {
      let preview = content
        .replace(/^#+ .+$/gm, '')
        .replace(/\*\*(.+?):\*\*.*/g, '')
        .replace(/\|.+\|/g, '')
        .replace(/[-=]{3,}/g, '')
        .trim()
        .substring(0, maxLength);
      if (content.length > maxLength) preview += '...';
      return preview;
    }

    function getDisplayName(filename) {
      return filename
        .replace('.md', '')
        .split(/[-_]/)
        .map(w => w.charAt(0).toUpperCase() + w.slice(1))
        .join(' ');
    }

    async function loadMemoryFromAPI() {
      if (!HACKMD_CONFIG.API_TOKEN) {
        showStatus('Error: HackMD API Token is not configured');
        return;
      }
      try {
        const res = await fetch(getFullApiUrl(`/notes/${HACKMD_CONFIG.MEMORY_NOTE_ID}`), {
          headers: { 'Authorization': 'Bearer ' + HACKMD_CONFIG.API_TOKEN }
        });
        if (!res.ok) {
          if (res.status === 401) {
            showAuthError();
            throw new Error('Unauthorized');
          }
          throw new Error('Failed to load memory');
        }
        const data = await res.json();
        const parsed = parseMemoryMarkdown(data.content);
        memoryData = { claudeMd: { content: data.content, parsed }, memoryFiles: [], memoryDirs: {} };
        renderMemory();
        memoryEmptyState.style.display = 'none';
        memoryMainContent.style.display = 'flex';
        filePathEl.textContent = 'HackMD';
        showStatus('Memory loaded from HackMD');
      } catch (e) {
        showStatus('Error loading memory: ' + e.message);
      }
    }

    async function loadMemoryDirectory() {
      loadMemoryFromAPI();
    }

    // stub — kept for compatibility
    async function _legacyLoadMemoryDirectory_UNUSED() {
    }

    function renderMemory() {
      renderMemoryTabs();
      renderMemoryContent();
    }

    function renderMemoryTabs() {
      memoryTabsContainer.innerHTML = memoryData.claudeMd
        ? `<button class="memory-tab active" data-tab="overview">Overview</button>`
        : '';

      memoryTabsContainer.querySelectorAll('.memory-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          memoryTabsContainer.querySelectorAll('.memory-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          renderMemoryContent();
        });
      });
    }

    async function saveMemoryNoteContent(content) {
      const res = await fetch(getFullApiUrl(`/notes/${HACKMD_CONFIG.MEMORY_NOTE_ID}`), {
        method: 'PATCH',
        headers: {
          'Authorization': 'Bearer ' + HACKMD_CONFIG.API_TOKEN,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ content })
      });
      if (!res.ok) {
        if (res.status === 401) {
          showAuthError();
          throw new Error('Unauthorized');
        }
        throw new Error('Failed to save memory note');
      }
    }

    function renderMemoryContent() {
      const activeTab = memoryTabsContainer.querySelector('.memory-tab.active');
      if (!activeTab) return;

      const tabId = activeTab.dataset.tab;

      if (tabId === 'overview') { renderMemoryOverview(); }
      else if (tabId.startsWith('file-')) {
        const fileName = tabId.replace('file-', '') + '.md';
        renderMemoryFile(fileName);
      } else if (tabId.startsWith('dir-')) {
        const dirName = tabId.replace('dir-', '');
        renderMemoryDirectory(dirName);
      }
    }

    function parseMarkdownTable(raw) {
      const lines = raw.split('\n').map(line => line.trim()).filter(line => line.startsWith('|'));
      if (lines.length < 2) return null;
      const headers = lines[0].split('|').map(cell => cell.trim()).filter(Boolean);
      const rows = lines.slice(2).map(line => line.split('|').map(cell => cell.trim()).filter(Boolean));
      return { headers, rows };
    }

    function renderMemorySectionBody(section) {
      if (!section.content) {
        return '<p style="color: var(--text-muted);">No content yet. Click Edit to add details.</p>';
      }

      if (section.type === 'table') {
        const table = parseMarkdownTable(section.content);
        if (table && table.headers.length) {
          let html = '<table class="memory-flat-table"><thead><tr>';
          table.headers.forEach(header => {
            html += `<th>${escapeHtml(header)}</th>`;
          });
          html += '</tr></thead><tbody>';
          table.rows.forEach(row => {
            html += '<tr>';
            row.forEach(cell => {
              html += `<td>${escapeHtml(cell)}</td>`;
            });
            html += '</tr>';
          });
          html += '</tbody></table>';
          return html;
        }
      }

      if (section.type === 'list') {
        const items = section.content.split('\n').map(line => line.trim()).filter(Boolean);
        if (items.length) {
          return `<ul class="memory-inline-list">${items.map(item => `<li>${escapeHtml(item.replace(/^[-*]\s+/, ''))}</li>`).join('')}</ul>`;
        }
      }

      return `<div class="markdown-content">${renderMarkdownToHtml(section.content)}</div>`;
    }

    function renderMemoryOverview() {
      if (!memoryData.claudeMd || !memoryData.claudeMd.parsed) return;

      const parsed = memoryData.claudeMd.parsed;
      let html = `<h1 class="memory-title" style="margin-bottom: 20px;">${escapeHtml(parsed.title)}</h1>`;

      parsed.sectionOrder.forEach(sectionName => {
        const section = parsed.sections[sectionName];
        html += `
          <div class="memory-section-card">
            <div class="memory-section-header">
              <div class="memory-section-title">${escapeHtml(sectionName)}</div>
              <button class="primary memory-edit-btn" data-section-name="${escapeHtml(sectionName)}">Edit</button>
            </div>
            <div class="memory-section-body">
              ${renderMemorySectionBody(section)}
            </div>
          </div>
        `;
      });

      memoryContentContainer.innerHTML = html;
      memoryContentContainer.querySelectorAll('.memory-edit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          openMemorySectionEditor(btn.dataset.sectionName);
        });
      });
    }

    function renderMemoryFile(fileName) {
      const file = memoryData.memoryFiles.find(f => f.name === fileName);
      if (!file) return;

      const content = renderMarkdownToHtml(file.content);

      memoryContentContainer.innerHTML = `
        <div class="file-card">
          <div class="file-card-header">
            <span class="file-card-title">${fileName}</span>
          </div>
          <div class="file-card-content expanded markdown-content">${content}</div>
        </div>
        <button onclick="openEditModal('${fileName}', 'memoryFile')" style="margin-top: 10px;">Edit ${fileName}</button>
      `;
    }

    function renderMemoryDirectory(dirName) {
      const files = memoryData.memoryDirs[dirName] || [];

      // Context directory uses flat list view
      if (dirName === 'context') {
        renderMemoryDirectoryFlat(dirName, files);
        return;
      }

      // All other directories use card grid view
      let html = `
        <div class="search-box">
          <span style="color: var(--text-muted);">&#128269;</span>
          <input type="text" placeholder="Search ${dirName}..." id="dirSearch" oninput="filterMemoryDirectory('${dirName}', this.value)">
        </div>
        <div class="memory-grid" id="dirGrid">
      `;

      for (const file of files) {
        const p = file.parsed;
        const title = p.title || getDisplayName(file.name);

        let fieldsHtml = '';
        const fieldEntries = Object.entries(p.fields).slice(0, 3);
        if (fieldEntries.length > 0) {
          fieldsHtml = '<div class="memory-card-fields">';
          for (const [key, value] of fieldEntries) {
            fieldsHtml += `
              <div class="memory-card-field">
                <span class="memory-card-field-label">${escapeHtml(key)}</span>
                <span class="memory-card-field-value">${escapeHtml(value)}</span>
              </div>
            `;
          }
          fieldsHtml += '</div>';
        }

        let preview = '';
        for (const [sectionName, sectionContent] of Object.entries(p.sections)) {
          if (sectionContent && sectionName !== '_intro') {
            preview = getPreview(sectionContent, 100);
            break;
          }
        }
        if (!preview) preview = getPreview(p.rawContent, 100);

        html += `
          <div class="memory-card" onclick="openFileModal('${dirName}', '${file.name}')" data-search="${escapeHtml((title + ' ' + JSON.stringify(p.fields) + ' ' + p.rawContent).toLowerCase())}">
            <div class="memory-card-title">${escapeHtml(title)}</div>
            ${fieldsHtml}
            <div class="memory-card-preview">${escapeHtml(preview)}</div>
          </div>
        `;
      }

      html += `
        <div class="add-btn" onclick="openNewFileModal('${dirName}')">
          + Add to ${dirName}
        </div>
      </div>`;

      memoryContentContainer.innerHTML = html;
    }

    function renderMemoryDirectoryFlat(dirName, files) {
      let html = `
        <div class="search-box">
          <span style="color: var(--text-muted);">&#128269;</span>
          <input type="text" placeholder="Search ${dirName}..." id="dirSearch" oninput="filterMemoryDirectory('${dirName}', this.value)">
        </div>
        <div id="dirGrid">
      `;

      for (const file of files) {
        const p = file.parsed;

        // Render fields as a key-value table
        const fieldEntries = Object.entries(p.fields);
        if (fieldEntries.length > 0) {
          html += `<div class="file-card" style="margin-bottom: 16px;"><table class="memory-flat-table"><tbody>`;
          for (const [key, value] of fieldEntries) {
            html += `<tr data-search="${escapeHtml((key + ' ' + value).toLowerCase())}"><td>${escapeHtml(key)}</td><td>${escapeHtml(value)}</td></tr>`;
          }
          html += `</tbody></table></div>`;
        }

        // Render parsed tables (teams, tools, etc.) as proper HTML tables
        for (const table of p.tables) {
          html += `<div class="file-card" style="margin-bottom: 16px;"><table class="memory-flat-table"><thead><tr>`;
          for (const h of table.headers) {
            html += `<th>${escapeHtml(h)}</th>`;
          }
          html += `</tr></thead><tbody>`;
          for (const row of table.rows) {
            const searchData = row.join(' ').toLowerCase();
            html += `<tr data-search="${escapeHtml(searchData)}">`;
            for (const cell of row) {
              html += `<td>${escapeHtml(cell)}</td>`;
            }
            html += `</tr>`;
          }
          html += `</tbody></table></div>`;
        }

        // Render non-table section content as list items
        for (const [sectionName, sectionContent] of Object.entries(p.sections)) {
          if (!sectionContent || sectionName === '_intro') continue;
          const lines = sectionContent.split('\n').filter(l => l.trim() && !l.trim().startsWith('|'));
          if (lines.length === 0) continue;
          html += `<div class="file-card" style="margin-bottom: 16px;"><table class="memory-flat-table"><thead><tr><th colspan="2">${escapeHtml(sectionName)}</th></tr></thead><tbody>`;
          for (const line of lines) {
            const cleanLine = line.replace(/^[-*]\s*/, '').replace(/\*\*(.+?)\*\*/g, '$1').trim();
            if (!cleanLine) continue;
            html += `<tr data-search="${escapeHtml((sectionName + ' ' + cleanLine).toLowerCase())}"><td colspan="2">${escapeHtml(cleanLine)}</td></tr>`;
          }
          html += `</tbody></table></div>`;
        }
      }

      html += `</div>`;
      memoryContentContainer.innerHTML = html;
    }

    function filterMemoryDirectory(dirName, searchTerm) {
      const grid = document.getElementById('dirGrid');
      const items = grid.querySelectorAll('.memory-card, tr[data-search]');
      const search = searchTerm.toLowerCase();
      items.forEach(item => {
        const searchData = item.dataset.search || '';
        item.style.display = (!search || searchData.includes(search)) ? '' : 'none';
      });
    }

    function renderMarkdownToHtml(md) {
      let html = escapeHtml(md);

      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      html = html.replace(/```[\s\S]*?```/g, match => {
        const code = match.replace(/```\w*\n?/g, '');
        return '<pre><code>' + code + '</code></pre>';
      });
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/(\|.+\|\n\|[-| ]+\|\n(?:\|.+\|\n?)+)/g, match => {
        const lines = match.trim().split('\n');
        const headers = lines[0].split('|').filter(c => c.trim());
        const rows = lines.slice(2).map(row => row.split('|').filter(c => c.trim()));
        let table = '<table><thead><tr>';
        headers.forEach(h => table += `<th>${h.trim()}</th>`);
        table += '</tr></thead><tbody>';
        rows.forEach(row => {
          table += '<tr>';
          row.forEach(cell => table += `<td>${cell.trim()}</td>`);
          table += '</tr>';
        });
        table += '</tbody></table>';
        return table;
      });
      html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
      html = html.replace(/^(?!<[hupol]|<li|<table|<pre)(.+)$/gm, '<p>$1</p>');
      html = html.replace(/<p><\/p>/g, '');
      html = html.replace(/<p>\s*<\/p>/g, '');

      return html;
    }

    // Modal functions

      const files = memoryData.memoryDirs[dirName];
      const file = files.find(f => f.name === fileName);
      if (!file) return;

      document.getElementById('modalBody').innerHTML = `
        <div class="markdown-content" style="margin-bottom: 20px;">
          ${renderMarkdownToHtml(file.content)}

          <label>Edit Raw Markdown</label>
          <textarea id="editContent">${escapeHtml(file.content)}</textarea>

      `;

      modalOverlay.classList.add('visible');
      modalOverlay.dataset.type = 'dirFile';
      modalOverlay.dataset.dirName = dirName;
      modalOverlay.dataset.fileName = fileName;

    function openNewFileModal(dirName) {
      document.getElementById('modalTitle').textContent = `Add to ${dirName}`;

      let template = '# New Entry\n\n';
      const existingFiles = memoryData.memoryDirs[dirName];
      if (existingFiles && existingFiles.length > 0) {
        const sample = existingFiles[0].parsed;
        for (const key of Object.keys(sample.fields)) {
          template += `**${key}:** \n`;

        template += '\n';

          if (section !== '_intro') {

      }

      document.getElementById('modalBody').innerHTML = `
        <div class="form-group">

          <input type="text" id="newFileName" placeholder="my-new-entry" style="width: 100%; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text-primary); font-size: 14px; font-family: inherit; margin-bottom: 16px;">
        </div>
        <div class="form-group">
          <label>Content</label>
          <textarea id="editContent">${escapeHtml(template)}</textarea>
        </div>
      `;

      modalOverlay.classList.add('visible');
      modalOverlay.dataset.type = 'newDirFile';

    }

    function openMemorySectionEditor(sectionName) {
      if (!memoryData.claudeMd || !memoryData.claudeMd.parsed) return;
      const section = memoryData.claudeMd.parsed.sections[sectionName];
      if (!section) return;

      document.getElementById('modalTitle').textContent = `Edit ${sectionName}`;
      document.getElementById('modalBody').innerHTML = `
        <div class="form-group">
          <label>${section.type === 'table' ? 'Markdown table' : section.type === 'list' ? 'Bullet list' : 'Content'}</label>
          <textarea id="editContent" style="min-height: 400px;">${escapeHtml(section.content || '')}</textarea>
        </div>
      `;

      modalOverlay.classList.add('visible');
      modalOverlay.dataset.type = 'memorySection';
      modalOverlay.dataset.sectionName = sectionName;
    }

    function closeModal() {
      modalOverlay.classList.remove('visible');
    }

    async function saveModal() {
      const type = modalOverlay.dataset.type;
      
      if (type === 'settings') {
        if (onSettingsSave) onSettingsSave();
        return;
      }

      const content = document.getElementById('editContent').value;

      try {
        if (type === 'memorySection') {
          const sectionName = modalOverlay.dataset.sectionName;
          const parsed = memoryData.claudeMd.parsed;
          if (!parsed || !parsed.sections[sectionName]) throw new Error('Section not found');
          parsed.sections[sectionName].content = content.trim();
          memoryData.claudeMd.content = serializeMemoryMarkdown(parsed);
          await saveMemoryNoteContent(memoryData.claudeMd.content);
          memoryData.claudeMd.parsed = parseMemoryMarkdown(memoryData.claudeMd.content);
          showStatus(`Saved ${sectionName} ✓`);
        } else if (type === 'dirFile') {
          const dirName = modalOverlay.dataset.dirName;
          const fileName = modalOverlay.dataset.fileName;
          const files = memoryData.memoryDirs[dirName];
          const file = files.find(f => f.name === fileName);
          if (file) {
            file.content = content;
            file.parsed = parseMemoryMarkdown(content);
            showStatus('Saved ' + fileName);
          }
        }

        closeModal();
        renderMemory();

      } catch (e) {
        showStatus('Error saving: ' + e.message);
      }
    }

    // ============================================================
    // ===== ARTICLES FUNCTIONALITY =====
    // ============================================================

    const STATUS_CYCLE = ['not-read', 'reading', 'read'];
    const STATUS_LABELS = { 'not-read': 'Not Read', 'reading': 'Reading…', 'read': 'Read ✓' };

    // In-memory state (source of truth, loaded from HackMD)
    let articlesList = [];
    let hasArticleChanges = false;

    function markArticleChanged() {
      hasArticleChanges = true;
      articlesSaveBtn.disabled = false;
    }

    // ── Markdown serialisation ──────────────────────────────────
    function articlesToMarkdown(articles) {
      const rows = articles.map(a =>
        `| ${a.id} | ${a.name.replace(/\|/g, '\\|')} | ${a.link} | ${a.status || 'not-read'} | ${a.progress ?? 0} |`
      ).join('\n');
      return `# Articles\n\n| id | name | link | status | progress |\n| -- | ---- | ---- | ------ | -------- |\n${rows}\n`;
    }

    function parseArticlesMarkdown(content) {
      const articles = [];
      const lines = (content || '').split('\n');
      let inTable = false;
      for (const line of lines) {
        if (!inTable) {
          if (line.startsWith('| id |') || line.startsWith('| id|')) { inTable = true; }
          continue;
        }
        if (/^\|[-| ]+\|/.test(line)) continue; // separator row
        if (!line.startsWith('|')) { inTable = false; continue; }
        const cells = line.split('|').slice(1, -1).map(c => c.trim());
        if (cells.length < 3) continue;
        const id = parseInt(cells[0], 10);
        if (isNaN(id)) continue;
        articles.push({
          id,
          name: (cells[1] || '').replace(/\\\|/g, '|'),
          link: cells[2] || '',
          status: cells[3] || 'not-read',
          progress: parseInt(cells[4] || '0', 10) || 0,
        });
      }
      return articles;
    }

    // ── Render ──────────────────────────────────────────────────
    function renderArticles() {
      const articles = articlesList;
      const statsEl = document.getElementById('articlesStats');
      const containerEl = document.getElementById('articlesContainer');

      const total = articles.length;
      const readCount = articles.filter(a => a.status === 'read').length;
      const readingCount = articles.filter(a => a.status === 'reading').length;

      statsEl.innerHTML = `
        <div class="articles-stat">
          <span class="articles-stat-value">${total}</span>
          <span class="articles-stat-label">Total</span>
        </div>
        <div class="articles-stat stat-read">
          <span class="articles-stat-value">${readCount}</span>
          <span class="articles-stat-label">Read</span>
        </div>
        <div class="articles-stat stat-reading">
          <span class="articles-stat-value">${readingCount}</span>
          <span class="articles-stat-label">Reading</span>
        </div>
        <div class="articles-stat">
          <span class="articles-stat-value">${total - readCount - readingCount}</span>
          <span class="articles-stat-label">Not Started</span>
        </div>
      `;

      if (total === 0) {
        containerEl.innerHTML = `<div class="empty-state" style="padding:40px 0;"><p style="font-size:15px;color:var(--text-muted);">No articles yet — add one above.</p></div>`;
        return;
      }

      containerEl.innerHTML = articles.map((article, idx) => {
        const pct = article.progress || 0;
        const isFull = pct === 100;
        let shortLink = article.link;
        try { shortLink = new URL(article.link).hostname.replace('www.', ''); } catch {}
        return `
          <div class="article-card" id="article-card-${article.id}">
            <div class="article-card-progress-bar">
              <div class="article-card-progress-fill ${isFull ? 'full' : ''}" style="width:${pct}%"></div>
            </div>
            <div class="article-card-body">
              <div class="article-num">${idx + 1}</div>
              <div class="article-card-main">
                <div class="article-title-row">
                  <a class="article-title-link" href="${safeUrl(article.link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(article.name)}</a>
                  <span class="article-ext-icon">↗ ${escapeHtml(shortLink)}</span>
                </div>
                <div class="article-controls">
                  <button class="article-status-btn ${article.status}" onclick="cycleArticleStatus(${article.id})">${STATUS_LABELS[article.status] || article.status}</button>
                  <div class="article-progress-group">
                    <input type="range" min="0" max="100" value="${pct}" class="article-progress-input"
                      oninput="updateArticleProgress(${article.id}, this.value)"
                      onchange="updateArticleProgress(${article.id}, this.value)">
                    <span class="article-progress-pct" id="article-pct-${article.id}">${pct}%</span>
                  </div>
                </div>
              </div>
              <button class="article-delete-btn" onclick="deleteArticle(${article.id})" title="Remove article">✕</button>
            </div>
          </div>
        `;
      }).join('');
    }

    // ── Actions ─────────────────────────────────────────────────
    window.cycleArticleStatus = function(id) {
      const article = articlesList.find(a => a.id === id);
      if (!article) return;
      const currentIdx = STATUS_CYCLE.indexOf(article.status);
      article.status = STATUS_CYCLE[(currentIdx + 1) % STATUS_CYCLE.length];
      if (article.status === 'read') article.progress = 100;
      markArticleChanged();
      renderArticles();
    };

    window.updateArticleProgress = function(id, value) {
      const article = articlesList.find(a => a.id === id);
      if (!article) return;
      const pct = parseInt(value, 10);
      article.progress = pct;
      if (pct === 100) article.status = 'read';
      else if (pct > 0) article.status = 'reading';
      else article.status = 'not-read';
      markArticleChanged();
      // Live DOM update (no full re-render)
      const fill = document.querySelector(`#article-card-${id} .article-card-progress-fill`);
      const pctLabel = document.getElementById(`article-pct-${id}`);
      const statusBtn = document.querySelector(`#article-card-${id} .article-status-btn`);
      if (fill) { fill.style.width = pct + '%'; fill.className = 'article-card-progress-fill' + (pct === 100 ? ' full' : ''); }
      if (pctLabel) pctLabel.textContent = pct + '%';
      if (statusBtn) { statusBtn.className = 'article-status-btn ' + article.status; statusBtn.textContent = STATUS_LABELS[article.status]; }
      // Update stats
      const total = articlesList.length;
      const readCount = articlesList.filter(a => a.status === 'read').length;
      const readingCount = articlesList.filter(a => a.status === 'reading').length;
      const statsEl = document.getElementById('articlesStats');
      if (statsEl) {
        const vals = statsEl.querySelectorAll('.articles-stat-value');
        if (vals[1]) vals[1].textContent = readCount;
        if (vals[2]) vals[2].textContent = readingCount;
        if (vals[3]) vals[3].textContent = total - readCount - readingCount;
      }
    };

    window.deleteArticle = function(id) {
      articlesList = articlesList.filter(a => a.id !== id);
      markArticleChanged();
      renderArticles();
    };

    // ── Add form ─────────────────────────────────────────────────
    const articlesAddToggle = document.getElementById('articlesAddToggle');
    const articleAddForm = document.getElementById('articleAddForm');
    const articleNameInput = document.getElementById('articleNameInput');
    const articleLinkInput = document.getElementById('articleLinkInput');

    articlesAddToggle.addEventListener('click', () => {
      articleAddForm.classList.toggle('visible');
      if (articleAddForm.classList.contains('visible')) articleNameInput.focus();
    });

    document.getElementById('articleCancelBtn').addEventListener('click', () => {
      articleAddForm.classList.remove('visible');
      articleNameInput.value = '';
      articleLinkInput.value = '';
    });

    function submitNewArticle() {
      const name = articleNameInput.value.trim();
      const link = articleLinkInput.value.trim();
      if (!name) { articleNameInput.focus(); return; }
      if (!link) { articleLinkInput.focus(); return; }
      const newId = articlesList.length > 0 ? Math.max(...articlesList.map(a => a.id)) + 1 : 1;
      articlesList.push({ id: newId, name, link, status: 'not-read', progress: 0 });
      articleNameInput.value = '';
      articleLinkInput.value = '';
      articleAddForm.classList.remove('visible');
      markArticleChanged();
      renderArticles();
      showStatus('Article added — save to HackMD to persist');
    }

    document.getElementById('articleSaveBtn').addEventListener('click', submitNewArticle);
    articleLinkInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitNewArticle(); });
    articleNameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') articleLinkInput.focus(); });

    // ── HackMD load / save ───────────────────────────────────────
    async function loadArticlesFromAPI() {
      if (!HACKMD_CONFIG.API_TOKEN) {
        showStatus('Error: HackMD API Token is not configured');
        return;
      }
      setSyncStatus('⟳ Loading…');
      try {
        const res = await fetch(getFullApiUrl(`/notes/${HACKMD_CONFIG.ARTICLES_NOTE_ID}`), {
          headers: { 'Authorization': 'Bearer ' + HACKMD_CONFIG.API_TOKEN }
        });
        if (!res.ok) {
          if (res.status === 401) {
            showAuthError();
            throw new Error('Unauthorized');
          }
          throw new Error('Failed to load');
        }
        const data = await res.json();
        articlesList = parseArticlesMarkdown(data.content);
        // Seed initial article if note is empty
        if (articlesList.length === 0) {
          articlesList = [{ id: 1, name: 'Building an AI Assistant into a Web App — What I Learned and Where I Think This Is Going', link: 'https://medium.com/@dominicbachmann/building-an-ai-assistant-into-a-web-app-what-i-learned-and-where-i-think-this-is-going-8d8642a9623c', status: 'not-read', progress: 0 }];
          markArticleChanged(); // auto-save seed on first use
        } else {
          hasArticleChanges = false;
          articlesSaveBtn.disabled = true;
        }
        renderArticles();
        setSyncStatus('✓ Synced with HackMD', 'var(--accent)');
        setTimeout(() => setSyncStatus(''), 3000);
      } catch (e) {
        setSyncStatus('⚠ Articles load failed', '#e55');
        showStatus('Error loading articles: ' + e.message);
        renderArticles();
      }
    }

    articlesSaveBtn.addEventListener('click', async () => {
      if (!hasArticleChanges) return;
      if (!HACKMD_CONFIG.API_TOKEN) {
        showStatus('Error: HackMD API Token is not configured');
        return;
      }
      articlesSaveBtn.disabled = true;
      articlesSaveBtn.textContent = 'Saving…';
      setSyncStatus('⟳ Saving…');
      try {
        const res = await fetch(getFullApiUrl(`/notes/${HACKMD_CONFIG.ARTICLES_NOTE_ID}`), {
          method: 'PATCH',
          headers: { 
            'Authorization': 'Bearer ' + HACKMD_CONFIG.API_TOKEN, 
            'Content-Type': 'application/json' 
          },
          body: JSON.stringify({ content: articlesToMarkdown(articlesList) })
        });
        if (!res.ok) throw new Error('Save failed');
        hasArticleChanges = false;
        showStatus('Saved to HackMD ✓');
        setSyncStatus('✓ Saved', 'var(--accent)');
        setTimeout(() => setSyncStatus(''), 3000);
      } catch (e) {
        showStatus('Error saving: ' + e.message);
        setSyncStatus('⚠ Save failed', '#e55');
        articlesSaveBtn.disabled = false;
      }
      articlesSaveBtn.textContent = 'Save to HackMD';
    });

    window.addEventListener('beforeunload', (e) => {
      if (hasArticleChanges) { e.preventDefault(); e.returnValue = ''; }
    });
  </script>
</body>
</html>
